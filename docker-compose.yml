services:
  timesheet-server:
    build: ./server
    container_name: timesheet-pro-server
    ports:
      - "3001:3000"
    volumes:
      - ./server/data:/app/data
    environment:
      - PORT=3000
      - DATABASE_URL=/app/data/timesheet.sqlite
      - OLLAMA_URL=http://10.10.1.168:11434
      - OLLAMA_MODEL=deepseek-r1:latest
    deploy:
      resources:
        limits:
          memory: 4G
    restart: always
